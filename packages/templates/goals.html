{% extends "base.html" %}

{% block title %}Goals - AAIA Dashboard{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1 class="display-6">Goals Management</h1>
        <p class="text-muted">Track and manage autonomous goals</p>
    </div>
</div>

<!-- Goals Controls -->
<div class="row mb-4">
    <div class="col-md-6">
        <button class="btn btn-primary" id="generateGoalsBtn">
            <i class="bi bi-sparkles"></i> Generate New Goals
        </button>
    </div>
    <div class="col-md-6">
        <div class="btn-group float-end" role="group">
            <input type="radio" class="btn-check" name="goalFilter" id="filterAll" value="all" checked>
            <label class="btn btn-outline-secondary" for="filterAll">All</label>
            
            <input type="radio" class="btn-check" name="goalFilter" id="filterActive" value="active">
            <label class="btn btn-outline-secondary" for="filterActive">Active</label>
            
            <input type="radio" class="btn-check" name="goalFilter" id="filterCompleted" value="completed">
            <label class="btn btn-outline-secondary" for="filterCompleted">Completed</label>
        </div>
    </div>
</div>

<!-- Goals Stats -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h6 class="card-subtitle mb-2 text-muted">Active Goals</h6>
                <h2 class="card-title" id="activeGoalsCount">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h6 class="card-subtitle mb-2 text-muted">Completed</h6>
                <h2 class="card-title" id="completedGoalsCount">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h6 class="card-subtitle mb-2 text-muted">Average Progress</h6>
                <h2 class="card-title" id="avgProgress">0%</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h6 class="card-subtitle mb-2 text-muted">Total Value</h6>
                <h2 class="card-title" id="totalValue">$0</h2>
            </div>
        </div>
    </div>
</div>

<!-- Goals List -->
<div class="row">
    <div class="col-12">
        <div id="goalsContainer">
            <!-- Goals will be loaded here -->
            <div class="text-center text-muted py-5">
                <p>Loading goals...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    class GoalsPage {
        constructor() {
            this.goals = [];
            this.currentFilter = 'all';
            this.init();
        }

        init() {
            this.loadGoals();
            this.setupEventListeners();
            this.setupWebSocketUpdates();
        }

        setupEventListeners() {
            document.getElementById('generateGoalsBtn').addEventListener('click', () => this.generateGoals());
            
            document.querySelectorAll('input[name="goalFilter"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    this.currentFilter = e.target.value;
                    this.renderGoals();
                });
            });
        }

        setupWebSocketUpdates() {
            if (!wsClient) return;
            
            wsClient.on('goal_created', (goal) => {
                this.goals.push(goal);
                this.renderGoals();
            });
            
            wsClient.on('goal_completed', (goal) => {
                const idx = this.goals.findIndex(g => g.id === goal.id);
                if (idx !== -1) {
                    this.goals[idx] = goal;
                    this.renderGoals();
                }
            });
        }

        async loadGoals() {
            try {
                const response = await fetch('/api/goals?limit=100&offset=0');
                if (response.ok) {
                    const data = await response.json();
                    this.goals = data.goals || [];
                    this.renderGoals();
                }
            } catch (error) {
                console.error('Error loading goals:', error);
            }
        }

        renderGoals() {
            const container = document.getElementById('goalsContainer');
            let filtered = this.goals;
            
            if (this.currentFilter !== 'all') {
                filtered = this.goals.filter(g => g.status === this.currentFilter);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-5"><p>No goals found</p></div>';
                return;
            }
            
            const html = filtered.map(goal => this.renderGoalCard(goal)).join('');
            container.innerHTML = html;
            
            this.updateStats();
        }

        renderGoalCard(goal) {
            const priority = goal.priority || 'medium';
            const priorityBadge = {
                'high': '<span class="badge bg-danger">HIGH</span>',
                'medium': '<span class="badge bg-warning">MEDIUM</span>',
                'low': '<span class="badge bg-info">LOW</span>'
            }[priority] || '<span class="badge bg-secondary">UNKNOWN</span>';
            
            const progress = goal.progress || 0;
            const status = goal.status || 'active';
            
            return `
                <div class="card mb-3 goal-card" data-goal-id="${goal.id}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0">Goal #${goal.id}: ${goal.goal_text || 'Unnamed Goal'}</h5>
                            ${priorityBadge}
                        </div>
                        
                        <p class="card-text text-muted small mb-3">${goal.description || ''}</p>
                        
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-1">
                                <small>Progress</small>
                                <small id="progress-${goal.id}">${progress}%</small>
                            </div>
                            <div class="progress">
                                <div class="progress-bar" role="progressbar" style="width: ${progress}%" 
                                     aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <small class="text-muted d-block">Expected Benefit</small>
                                <strong>${goal.expected_benefit || 'Unknown'}</strong>
                            </div>
                            <div class="col-md-6">
                                <small class="text-muted d-block">Estimated Effort</small>
                                <strong>${goal.estimated_effort || 'Unknown'}</strong>
                            </div>
                        </div>
                        
                        <div class="row mb-3 small text-muted">
                            <div class="col-md-6">Created: ${this.formatDate(goal.created_at)}</div>
                            <div class="col-md-6">Updated: ${this.formatDate(goal.updated_at)}</div>
                        </div>
                        
                        <div class="btn-group btn-group-sm" role="group">
                            ${status === 'active' ? `
                                <button class="btn btn-success" onclick="goalsPage.completeGoal(${goal.id})">
                                    <i class="bi bi-check"></i> Complete
                                </button>
                            ` : ''}
                            <button class="btn btn-outline-secondary" onclick="goalsPage.viewGoalDetails(${goal.id})">
                                <i class="bi bi-eye"></i> Details
                            </button>
                            <button class="btn btn-outline-danger" onclick="goalsPage.deleteGoal(${goal.id})">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        updateStats() {
            const active = this.goals.filter(g => g.status === 'active').length;
            const completed = this.goals.filter(g => g.status === 'completed').length;
            const avgProgress = this.goals.length > 0 
                ? Math.round(this.goals.reduce((sum, g) => sum + (g.progress || 0), 0) / this.goals.length)
                : 0;
            
            document.getElementById('activeGoalsCount').textContent = active;
            document.getElementById('completedGoalsCount').textContent = completed;
            document.getElementById('avgProgress').textContent = avgProgress + '%';
        }

        async generateGoals() {
            try {
                const response = await fetch('/api/goals/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: 3 })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    this.loadGoals();
                    alert(`Generated ${data.goals?.length || 0} new goals`);
                }
            } catch (error) {
                console.error('Error generating goals:', error);
                alert('Failed to generate goals');
            }
        }

        async completeGoal(goalId) {
            try {
                const response = await fetch(`/api/goals/${goalId}/complete`, { method: 'PUT' });
                if (response.ok) {
                    this.loadGoals();
                }
            } catch (error) {
                console.error('Error completing goal:', error);
            }
        }

        viewGoalDetails(goalId) {
            alert(`Goal ${goalId} details - Not yet implemented`);
        }

        async deleteGoal(goalId) {
            if (!confirm('Are you sure you want to delete this goal?')) return;
            
            try {
                const response = await fetch(`/api/goals/${goalId}`, { method: 'DELETE' });
                if (response.ok) {
                    this.loadGoals();
                }
            } catch (error) {
                console.error('Error deleting goal:', error);
            }
        }

        formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            try {
                return new Date(dateStr).toLocaleDateString();
            } catch {
                return 'N/A';
            }
        }
    }

    let goalsPage = null;
    document.addEventListener('DOMContentLoaded', () => {
        goalsPage = new GoalsPage();
    });
</script>
{% endblock %}
